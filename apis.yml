aid: xweather
name: Xweather
description: >-
  Xweather, a Vaisala company, provides weather data APIs delivering science-backed, hyper-local weather intelligence
  for operational applications. The Xweather Weather API exposes current conditions, forecasts, severe weather alerts,
  lightning data, air quality, observations, wildfire information, tropical cyclone tracks, and maritime weather through
  a single REST API. Authentication uses a client_id and client_secret passed as query parameters or HTTP headers.
