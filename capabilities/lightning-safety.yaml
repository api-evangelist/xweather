naftiko: 1.0.0-alpha2
info:
  label: Lightning Safety Automation
  description: Drive automated stop-work and all-clear decisions for outdoor operations using Xweather lightning strike events
    and lightning threat nowcasts. Designed for a Safety Officer responsible for outdoor worker and public safety.
  tags:
  - Safety Officer
  - Lightning
  - Severe Weather
  - Operations
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    XWEATHER_CLIENT_ID: XWEATHER_CLIENT_ID
    XWEATHER_CLIENT_SECRET: XWEATHER_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: xweather-weather-api
    baseUri: https://data.api.xweather.com
    description: Xweather Weather API base endpoint.
    authentication:
      type: query
      parameters:
      - name: client_id
        value: '{{env.XWEATHER_CLIENT_ID}}'
      - name: client_secret
        value: '{{env.XWEATHER_CLIENT_SECRET}}'
    resources:
    - name: conditions
      path: /conditions
      description: Current and historical surface weather conditions.
      operations:
      - name: get-conditions
        method: GET
        path: /conditions/{location}
        description: Get current weather conditions for a location.
        inputParameters:
        - name: location
          in: path
          type: string
          required: true
          description: Location identifier (ZIP, city/state, lat/long, place, station).
        - name: fields
          in: query
          type: string
          required: false
        - name: filter
          in: query
          type: string
          required: false
        - name: limit
          in: query
          type: integer
          required: false
        outputRawFormat: json
    - name: forecasts
      path: /forecasts
      description: Hourly and daily weather forecasts.
      operations:
      - name: get-forecasts
        method: GET
        path: /forecasts/{location}
        description: Get forecast records for a location.
        inputParameters:
        - name: location
          in: path
          type: string
          required: true
        - name: filter
          in: query
          type: string
          required: false
        - name: limit
          in: query
          type: integer
          required: false
        outputRawFormat: json
    - name: alerts
      path: /alerts
      description: Severe weather alerts and warnings.
      operations:
      - name: get-alerts
        method: GET
        path: /alerts/{location}
        description: Get active severe weather alerts for a location.
        inputParameters:
        - name: location
          in: path
          type: string
          required: true
        - name: filter
          in: query
          type: string
          required: false
        outputRawFormat: json
    - name: lightning
      path: /lightning
      description: Lightning strike events and threat nowcasts.
      operations:
      - name: get-lightning
        method: GET
        path: /lightning/{location}
        description: Get recent lightning strike events near a location.
        inputParameters:
        - name: location
          in: path
          type: string
          required: true
        - name: from
          in: query
          type: string
          required: false
        - name: to
          in: query
          type: string
          required: false
        - name: limit
          in: query
          type: integer
          required: false
        outputRawFormat: json
      - name: get-lightning-threats
        method: GET
        path: /lightning/threats/{location}
        description: Get lightning threat nowcast for a location.
        inputParameters:
        - name: location
          in: path
          type: string
          required: true
        outputRawFormat: json
    - name: air-quality
      path: /airquality
      description: Air quality index and pollutant data.
      operations:
      - name: get-air-quality
        method: GET
        path: /airquality/{location}
        description: Get current air quality and primary pollutant for a location.
        inputParameters:
        - name: location
          in: path
          type: string
          required: true
        outputRawFormat: json
    - name: observations
      path: /observations
      description: Reports from individual surface weather stations.
      operations:
      - name: get-observations
        method: GET
        path: /observations/{location}
        description: Get the most recent observation from a station near the location.
        inputParameters:
        - name: location
          in: path
          type: string
          required: true
        - name: filter
          in: query
          type: string
          required: false
        outputRawFormat: json
    - name: fires
      path: /fires
      description: Active wildfire incidents.
      operations:
      - name: get-wildfires
        method: GET
        path: /fires/{location}
        description: Get active wildfires near a location.
        inputParameters:
        - name: location
          in: path
          type: string
          required: true
        - name: limit
          in: query
          type: integer
          required: false
        outputRawFormat: json
    - name: tropical
      path: /tropicalcyclones
      description: Tropical cyclone tracks and intensities.
      operations:
      - name: list-tropical-cyclones
        method: GET
        path: /tropicalcyclones
        description: List currently active tropical cyclones globally.
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
        outputRawFormat: json
    - name: maritime
      path: /maritime
      description: Marine and ocean weather conditions.
      operations:
      - name: get-maritime-conditions
        method: GET
        path: /maritime/{location}
        description: Get marine weather conditions (waves, swell, SST) for a location.
        inputParameters:
        - name: location
          in: path
          type: string
          required: true
        outputRawFormat: json
  exposes:
  - type: http
    namespace: lightning-safety
    paths:
    - path: /sites/{location}/lightning/strikes
      method: GET
      summary: Get Recent Lightning Strikes
      description: Recent cloud-to-ground strikes near a monitored site.
      calls:
      - capability: xweather-weather-api.lightning.get-lightning
        parameters:
          location: '{location}'
    - path: /sites/{location}/lightning/threat
      method: GET
      summary: Get Lightning Threat Nowcast
      description: Probabilistic short-term lightning threat for a site.
      calls:
      - capability: xweather-weather-api.lightning.get-lightning-threats
        parameters:
          location: '{location}'
  - type: mcp
    namespace: lightning-safety
    tools:
    - name: get_recent_strikes
      description: List recent lightning strikes near a site.
      calls:
      - capability: xweather-weather-api.lightning.get-lightning
    - name: get_threat_nowcast
      description: Get the lightning threat nowcast for a site.
      calls:
      - capability: xweather-weather-api.lightning.get-lightning-threats
